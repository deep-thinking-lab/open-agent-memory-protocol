name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

# kizuna-stage-1's actions runner runs as root in a user namespace where
# CAP_CHOWN is restricted; tar archive extraction needs --no-same-owner to
# avoid EPERM. See .github/workflows/ci.yml for the matching setting.
env:
  TAR_OPTIONS: --no-same-owner

jobs:
  test:
    name: Run tests before release
    runs-on: [self-hosted, Linux, X64, voxeltron-ci]
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v4

      - name: Rust — Run tests
        working-directory: reference/rust
        run: cargo test --lib --tests

      - name: TypeScript — Install dependencies
        working-directory: reference/typescript
        run: npm ci

      - name: TypeScript — Build
        working-directory: reference/typescript
        run: npm run build

      - name: TypeScript — Run tests
        working-directory: reference/typescript
        run: npm test

      - name: Python — Install dependencies
        working-directory: reference/python
        run: |-
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Python — Run tests
        working-directory: reference/python
        run: .venv/bin/python -m pytest tests/ -v

      - name: Go — Download modules
        working-directory: reference/go
        run: go mod download

      - name: Go — Run tests
        working-directory: reference/go
        run: go test ./... -count=1

      - name: Elixir — Run tests
        working-directory: reference/elixir
        run: |-
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix test

  publish-rust:
    name: Publish Rust crate
    needs: test
    runs-on: [self-hosted, Linux, X64, voxeltron-ci]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v4

      - name: Publish to crates.io
        working-directory: reference/rust
        run: cargo publish --token ${CRATES_IO_TOKEN}
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  publish-npm:
    name: Publish npm package
    needs: test
    runs-on: [self-hosted, Linux, X64, voxeltron-ci]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v4

      - name: Setup Node
        working-directory: reference/typescript
        run: npm ci

      - name: Build
        working-directory: reference/typescript
        run: npm run build

      - name: Publish to npm
        working-directory: reference/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish Python package
    needs: test
    runs-on: [self-hosted, Linux, X64, voxeltron-ci]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v4

      - name: Install build tools
        working-directory: reference/python
        run: |-
          python3 -m venv .venv
          .venv/bin/pip install --upgrade build twine

      - name: Build package
        working-directory: reference/python
        run: .venv/bin/python -m build

      - name: Publish to PyPI
        working-directory: reference/python
        run: .venv/bin/python -m twine upload dist/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-elixir:
    name: Publish Elixir package
    needs: test
    runs-on: [self-hosted, Linux, X64, voxeltron-ci]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v4

      - name: Publish to Hex.pm
        working-directory: reference/elixir
        run: |-
          mix local.hex --force
          mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_TOKEN }}

  create-github-release:
    name: Create GitHub Release
    needs: test
    runs-on: [self-hosted, Linux, X64, voxeltron-ci]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## What's Changed

            See [CHANGELOG.md](https://github.com/deep-thinking-llc/open-agent-memory-protocol/blob/main/CHANGELOG.md) for details.

            ### Packages Published
            - 🦀 **Rust** (`oamp-types`): `cargo add oamp-types@${{ steps.version.outputs.VERSION }}`
            - 📦 **npm** (`@deep-thinking/oamp-types`): `npm install @deep-thinking/oamp-types@${{ steps.version.outputs.VERSION }}`
            - 🐍 **PyPI** (`oamp-types`): `pip install oamp-types==${{ steps.version.outputs.VERSION }}`
            - 🔵 **Hex** (`oamp_types`): `mix deps.update oamp_types`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}